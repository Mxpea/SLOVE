<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 推荐系统 Demo - 首页</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <header>
        <div>
            <h2>短视频推荐系统 Demo</h2>
            <small>基于 TF-IDF 与余弦相似度</small>
        </div>
        <nav>
            <a href="/">首页</a>
            <a href="/explain">推荐原理</a>
            <a href="#" onclick="clearHistory(); return false;">清空观看历史</a>
        </nav>
    </header>

    <div class="container">
        <h2>为你推荐 (基于你的观看历史)</h2>
        <div id="recommendations-container" class="video-grid" style="margin-bottom: 40px; display: none;">
            <!-- 推荐视频会在这里加载 -->
        </div>
        <p id="no-history-msg" style="color:#7f8c8d; font-style:italic;">暂无观看历史，先随便看几个视频吧。</p>

        <h2>全部视频列表</h2>
        <div id="video-list" class="video-grid">
            <!-- 视频列表将由 JS 动态生成 -->
            <p>加载视频中...</p>
        </div>
    </div>

    <script src="/static/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // 1. 获取所有视频
            fetch('/api/videos')
                .then(res => res.json())
                .then(videos => {
                    const listEl = document.getElementById('video-list');
                    listEl.innerHTML = '';
                    videos.forEach(v => {
                        const card = document.createElement('div');
                        card.className = 'video-card';
                        card.onclick = () => window.location.href = `/video/${v.video_id}`;
                        card.innerHTML = `
                            <h3>${v.title}</h3>
                            <div class="tags">${v.tags}</div>
                        `;
                        listEl.appendChild(card);
                    });
                });

            // 2. 根据本地历史获取个性化推荐
            const history = getHistory();
            if (history.length > 0) {
                document.getElementById('no-history-msg').style.display = 'none';
                document.getElementById('recommendations-container').style.display = 'grid';
                
                fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: history })
                })
                .then(res => res.json())
                .then(data => {
                    const recContainer = document.getElementById('recommendations-container');
                    recContainer.innerHTML = '';
                    if (data.recommendations && data.recommendations.length > 0) {
                        data.recommendations.forEach(r => {
                            const card = document.createElement('div');
                            card.className = 'video-card';
                            card.onclick = () => window.location.href = `/video/${r.video_id}`;
                            card.innerHTML = `
                                <h3>${r.title} <span class="score-badge">相似度: ${(r.score * 100).toFixed(1)}%</span></h3>
                                <div class="tags">${r.tags}</div>
                            `;
                            recContainer.appendChild(card);
                        });
                    } else {
                        recContainer.innerHTML = '<p>没有足够的推荐数据。</p>';
                    }
                });
            }
        });
    </script>
</body>
</html>
