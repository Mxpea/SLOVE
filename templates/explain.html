<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术文档 - 推荐系统 Demo</title>
    <link rel="stylesheet" href="/static/style.css">
    <!-- 引入 marked.js 解析 Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <!-- 引入 MathJax 用于数学公式渲染 -->
    <script src="https://polyfill.io/v3/polyfill.min.js?features=es6"></script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        .header-nav {
            background: linear-gradient(180deg, rgba(5,3,10,0.9) 0%, rgba(5,3,10,0.2) 100%);
            border-bottom: 1px solid rgba(0, 246, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-nav h2 { 
            margin: 0; 
            font-size: 1.2rem; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 246, 255, 0.8);
            letter-spacing: 2px;
        }
        .header-links { display: flex; gap: 20px; align-items: center; }
        .header-links a { 
            color: rgba(255, 255, 255, 0.8); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .header-links a:hover {
            color: #00f6ff;
            text-shadow: 0 0 8px rgba(0, 246, 255, 0.6);
        }
        
        /* 侧边栏按钮 */
        .sidebar-toggle {
            background: rgba(0, 246, 255, 0.1);
            color: #00f6ff;
            border: 1px solid rgba(0, 246, 255, 0.4);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sidebar-toggle:hover {
            background: rgba(0, 246, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 4px;
        }

        .docs-layout {
            display: flex;
            min-height: calc(100vh - 80px);
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        /* 侧边栏样式 */
        .docs-sidebar {
            width: 280px;
            background: rgba(10, 13, 24, 0.6);
            border-right: 1px solid rgba(0, 246, 255, 0.2);
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .docs-sidebar.collapsed {
            width: 0;
            padding: 0;
            border-right: none;
            overflow: hidden;
            opacity: 0;
        }

        .docs-content {
            flex: 1;
            background: rgba(10, 13, 24, 0.4);
            border: 1px solid rgba(0, 246, 255, 0.1);
            border-left: none;
            padding: 40px;
            overflow-y: auto;
            min-width: 0; 
            backdrop-filter: blur(4px);
        }
        
        .docs-sidebar ul {
            list-style-type: none;
            padding-left: 15px;
        }
        .docs-sidebar > ul {
            padding-left: 0;
        }
        .docs-sidebar li {
            margin: 8px 0;
        }
        .docs-sidebar a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: block;
            padding: 6px 10px;
            border-radius: 2px;
            transition: all 0.2s;
            font-size: 0.95em;
        }
        .docs-sidebar a:hover {
            background: rgba(0, 246, 255, 0.1);
            color: #00f6ff;
            border-left: 2px solid #00f6ff;
        }
        .docs-sidebar a.active {
            background: rgba(255, 43, 214, 0.15);
            color: #ff2bd6;
            border-left: 2px solid #ff2bd6;
            text-shadow: 0 0 5px rgba(255, 43, 214, 0.5);
        }

        /* 文件夹折叠样式 */
        .docs-dir-title {
            font-weight: bold;
            color: #00f6ff;
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            padding: 4px 6px;
            border-radius: 2px;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .docs-dir-title:hover {
            background: rgba(0, 246, 255, 0.1);
        }
        .docs-dir-title::before {
            content: "▼";
            font-size: 0.8em;
            margin-right: 6px;
            color: #ff2bd6;
            transition: transform 0.2s ease;
        }
        .docs-dir-title.collapsed::before {
            transform: rotate(-90deg);
        }
        .folder-content {
            transition: all 0.3s ease;
            overflow: hidden;
            display: block;
        }
        .folder-content.hidden {
            display: none;
        }

        /* Markdown 渲染样式微调 (暗黑科技风) */
        .markdown-body {
            color: #e0e6ed;
            font-family: inherit;
        }
        .markdown-body img { max-width: 100%; height: auto; border: 1px solid rgba(0, 246, 255, 0.3); }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
            color: #00f6ff; 
            border-bottom: 1px solid rgba(0, 246, 255, 0.2);
            padding-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 8px rgba(0, 246, 255, 0.3);
        }
        .markdown-body strong {
            color: #ff2bd6;
        }
        .markdown-body code {
            background: rgba(255, 43, 214, 0.1);
            padding: 2px 5px;
            border-radius: 2px;
            color: #ff2bd6;
            font-family: monospace;
            border: 1px solid rgba(255, 43, 214, 0.3);
        }
        .markdown-body pre code { 
            background: transparent; 
            border: none;
            color: #00f6ff; 
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.5);
            color: #00f6ff;
            padding: 15px;
            border-radius: 2px;
            overflow-x: auto;
            font-size: 0.9em;
            border-left: 3px solid #ff2bd6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .markdown-body a {
            color: #ff2bd6;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px rgba(255, 43, 214, 0.5);
        }
        
        .loading-text {
            color: #00f6ff;
            font-family: 'Orbitron', sans-serif;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px #00f6ff; }
            100% { opacity: 0.5; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .header-nav {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            .header-links {
                width: 100%;
                justify-content: space-between;
            }
            .container {
                margin: 0;
            }
            .docs-layout {
                flex-direction: column;
                margin-top: 0;
                min-height: calc(100vh - 120px);
            }
            .docs-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(0, 246, 255, 0.2);
                max-height: 40vh;
                padding: 15px;
            }
            .docs-sidebar.collapsed {
                height: 0;
                max-height: 0;
                padding: 0;
                border-bottom: none;
                width: 100%;
                opacity: 0;
            }
            .docs-content {
                padding: 20px;
                border: none;
            }
        }
    </style>
</head>
<body>
    <header class="header-nav">
        <div>
            <h2>技术文档</h2>
        </div>
        <nav class="header-links">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <span>[=]</span> 目录
            </button>
            <a href="/">首页</a>
            <a href="/demo">视频广场</a>
        </nav>
    </header>

    <div class="container">
        <div class="docs-layout">
            <aside class="docs-sidebar" id="sidebar">
                <div class="loading-text">正在加载目录...</div>
            </aside>
            <main class="docs-content markdown-body" id="content">
                <h1 style="color: #00f6ff;">欢迎使用</h1>
                <p>请选择左侧栏的文档进行阅读。</p>
            </main>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            fetchDocsTree();
            
            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
            }
        });

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function toggleFolder(el) {
            el.classList.toggle('collapsed');
            const ul = el.nextElementSibling;
            if (ul && ul.classList.contains('folder-content')) {
                ul.classList.toggle('hidden');
            }
        }

        async function fetchDocsTree() {
            try {
                const res = await fetch('/api/docs/tree');
                const tree = await res.json();
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = renderTree(tree);
                
                const firstFile = findFirstFile(tree);
                if (firstFile) {
                    loadDoc(firstFile.path);
                }
            } catch (err) {
                console.error("加载文档树失败", err);
                document.getElementById('sidebar').innerHTML = '<div style="color:#ff2bd6; padding: 20px; font-family: monospace;">[错误] 找不到文档数据</div>';
            }
        }

        function renderTree(nodes) {
            if (!nodes || nodes.length === 0) return '';
            let html = '<ul class="folder-content">';
            for (const node of nodes) {
                if (node.type === 'dir') {
                    html += `
                        <li>
                            <div class="docs-dir-title" onclick="toggleFolder(this)">> ${node.name}</div>
                            ${renderTree(node.children)}
                        </li>
                    `;
                } else if (node.type === 'file') {
                    const safePath = encodeURIComponent(node.path);
                    html += `
                        <li>
                            <a data-path="${node.path}" onclick="loadDoc('${safePath}')">_ ${node.name}</a>
                        </li>
                    `;
                }
            }
            html += '</ul>';
            return html;
        }

        function findFirstFile(nodes) {
            for (const node of nodes) {
                if (node.type === 'file') return node;
                if (node.type === 'dir') {
                    const found = findFirstFile(node.children);
                    if (found) return found;
                }
            }
            return null;
        }

        async function loadDoc(encodedPath) {
            const path = decodeURIComponent(encodedPath);
            
            document.querySelectorAll('.docs-sidebar a').forEach(a => a.classList.remove('active'));
            const safeSelector = path.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            const activeLink = document.querySelector('.docs-sidebar a[data-path="' + safeSelector + '"]');
            if (activeLink) activeLink.classList.add('active');

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
            }

            try {
                document.getElementById('content').innerHTML = '<div class="loading-text">正在加载文档内容...</div>';
                const res = await fetch('/api/docs/content/' + encodedPath);
                if (res.status === 404) {
                    document.getElementById('content').innerHTML = '<h2 style="color:#ff2bd6;">[404] 找不到该文档</h2>';
                    return;
                }
                const data = await res.json();

                const htmlContent = marked.parse(data.content);
                document.getElementById('content').innerHTML = htmlContent;

                if (window.MathJax) {
                    MathJax.typesetPromise([document.getElementById('content')]).catch((err) => console.log(err.message));
                }
            } catch (err) {
                console.error("加载文档内容失败", err);
                document.getElementById('content').innerHTML = '<h2 style="color:#ff2bd6;">[错误] 文档加载失败</h2>';
            }
        }
    </script>
</body>
</html>
