<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>技术文档 - 推荐系统 Demo</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="stylesheet" href="/static/style.css">
    <!-- 引入本地的 marked.js 解析 Markdown，提升加载速度 -->
    <script src="/static/marked.min.js?v=4.3.0"></script>
    <!-- 引入 MathJax 用于数学公式渲染，移除失效且挂起的 polyfill.io -->
    <script>
        window.MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']]
            }
        };
    </script>
    <script id="MathJax-script" async src="https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.min.js"></script>
    <style>
        #engine-loader {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #05030a;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #00f6ff;
            font-family: 'Orbitron', monospace;
            transition: opacity 0.4s ease, visibility 0.4s ease;
        }
        .engine-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 246, 255, 0.2);
            border-radius: 50%;
            border-top-color: #00f6ff;
            animation: engine-spin 1s ease-in-out infinite;
            margin-bottom: 20px;
        }
        @keyframes engine-spin {
            to { transform: rotate(360deg); }
        }
        .header-nav {
            background: linear-gradient(180deg, rgba(5,3,10,0.9) 0%, rgba(5,3,10,0.2) 100%);
            border-bottom: 1px solid rgba(0, 246, 255, 0.15);
            backdrop-filter: blur(8px);
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-nav h2 { 
            margin: 0; 
            font-size: 1.2rem; 
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 10px rgba(0, 246, 255, 0.8);
            letter-spacing: 2px;
        }
        .header-links { display: flex; gap: 20px; align-items: center; }
        .header-links a { 
            color: rgba(255, 255, 255, 0.8); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: all 0.3s ease;
        }
        .header-links a:hover {
            color: #00f6ff;
            text-shadow: 0 0 8px rgba(0, 246, 255, 0.6);
        }
        
        /* 侧边栏按钮 */
        .sidebar-toggle {
            background: rgba(0, 246, 255, 0.1);
            color: #00f6ff;
            border: 1px solid rgba(0, 246, 255, 0.4);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 2px;
            font-size: 14px;
            font-family: 'Space Grotesk', sans-serif;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .sidebar-toggle:hover {
            background: rgba(0, 246, 255, 0.2);
            box-shadow: 0 0 15px rgba(0, 246, 255, 0.4);
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            border-radius: 4px;
        }

        .docs-layout {
            display: flex;
            min-height: calc(100vh - 80px);
            margin-top: 20px;
            transition: all 0.3s ease;
        }

        /* 侧边栏样式 */
        .docs-sidebar {
            width: 280px;
            background: rgba(10, 13, 24, 0.6);
            border-right: 1px solid rgba(0, 246, 255, 0.2);
            padding: 20px;
            overflow-y: auto;
            backdrop-filter: blur(4px);
            transition: all 0.3s ease;
            box-sizing: border-box;
        }
        .docs-sidebar.collapsed {
            width: 0;
            padding: 0;
            border-right: none;
            overflow: hidden;
            opacity: 0;
        }

        .docs-content {
            flex: 1;
            background: rgba(10, 13, 24, 0.4);
            border: 1px solid rgba(0, 246, 255, 0.1);
            border-left: none;
            padding: 40px;
            overflow-y: auto;
            min-width: 0; 
            backdrop-filter: blur(4px);
        }
        
        .docs-sidebar ul {
            list-style-type: none;
            padding-left: 15px;
        }
        .docs-sidebar > ul {
            padding-left: 0;
        }
        .docs-sidebar li {
            margin: 8px 0;
        }
        .docs-sidebar a {
            text-decoration: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            display: block;
            padding: 6px 10px;
            border-radius: 2px;
            transition: all 0.2s;
            font-size: 0.95em;
        }
        .docs-sidebar a:hover {
            background: rgba(0, 246, 255, 0.1);
            color: #00f6ff;
            border-left: 2px solid #00f6ff;
        }
        .docs-sidebar a.active {
            background: rgba(255, 43, 214, 0.15);
            color: #ff2bd6;
            border-left: 2px solid #ff2bd6;
            text-shadow: 0 0 5px rgba(255, 43, 214, 0.5);
        }

        /* 文件夹折叠样式 */
        .docs-dir-title {
            font-weight: bold;
            color: #00f6ff;
            margin-top: 10px;
            margin-bottom: 5px;
            font-size: 0.9em;
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            padding: 4px 6px;
            border-radius: 2px;
            transition: background 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        .docs-dir-title:hover {
            background: rgba(0, 246, 255, 0.1);
        }
        .docs-dir-title::before {
            content: "▼";
            font-size: 0.8em;
            margin-right: 6px;
            color: #ff2bd6;
            transition: transform 0.2s ease;
        }
        .docs-dir-title.collapsed::before {
            transform: rotate(-90deg);
        }
        .folder-content {
            transition: all 0.3s ease;
            overflow: hidden;
            display: block;
        }
        .folder-content.hidden {
            display: none;
        }

        /* Markdown 渲染样式微调 (暗黑科技风) */
        .markdown-body {
            color: #e0e6ed;
            font-family: inherit;
        }
        .markdown-body img { max-width: 100%; height: auto; border: 1px solid rgba(0, 246, 255, 0.3); }
        .markdown-body h1, .markdown-body h2, .markdown-body h3 { 
            color: #00f6ff; 
            border-bottom: 1px solid rgba(0, 246, 255, 0.2);
            padding-bottom: 8px;
            font-family: 'Orbitron', sans-serif;
            text-shadow: 0 0 8px rgba(0, 246, 255, 0.3);
        }
        .markdown-body strong {
            color: #ff2bd6;
        }
        .markdown-body code {
            background: rgba(255, 43, 214, 0.1);
            padding: 2px 5px;
            border-radius: 2px;
            color: #ff2bd6;
            font-family: monospace;
            border: 1px solid rgba(255, 43, 214, 0.3);
        }
        .markdown-body pre code { 
            background: transparent; 
            border: none;
            color: #00f6ff; 
        }
        .markdown-body pre {
            background: rgba(0, 0, 0, 0.5);
            color: #00f6ff;
            padding: 15px;
            border-radius: 2px;
            overflow-x: auto;
            font-size: 0.9em;
            border-left: 3px solid #ff2bd6;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }
        .markdown-body a {
            color: #ff2bd6;
            text-decoration: none;
        }
        .markdown-body a:hover {
            text-decoration: underline;
            text-shadow: 0 0 5px rgba(255, 43, 214, 0.5);
        }
        
        .loading-text {
            color: #00f6ff;
            font-family: 'Orbitron', sans-serif;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; text-shadow: 0 0 10px #00f6ff; }
            100% { opacity: 0.5; }
        }

        /* 移动端适配 */
        @media (max-width: 768px) {
            .header-nav {
                padding: 15px 20px;
                flex-direction: column;
                gap: 15px;
                align-items: flex-start;
            }
            .header-links {
                width: 100%;
                justify-content: space-between;
            }
            .container {
                margin: 0;
            }
            .docs-layout {
                flex-direction: column;
                margin-top: 0;
                min-height: calc(100vh - 120px);
            }
            .docs-sidebar {
                width: 100%;
                border-right: none;
                border-bottom: 1px solid rgba(0, 246, 255, 0.2);
                max-height: 40vh;
                padding: 15px;
            }
            .docs-sidebar.collapsed {
                height: 0;
                max-height: 0;
                padding: 0;
                border-bottom: none;
                width: 100%;
                opacity: 0;
            }
            .docs-content {
                padding: 20px;
                border: none;
            }
        }
    </style>
</head>
<body>
    <!-- 全局加载遮罩，等待引擎(如MathJax)准备完毕 -->
    <div id="engine-loader">
        <div class="engine-spinner"></div>
        <div>正在初始化渲染引擎...</div>
    </div>

    <header class="header-nav">
        <div>
            <h2>技术文档</h2>
        </div>
        <nav class="header-links">
            <button class="sidebar-toggle" onclick="toggleSidebar()">
                <span>[=]</span> 目录
            </button>
            <a href="/">首页</a>
            <a href="/demo">视频广场</a>
        </nav>
    </header>

    <div class="container">
        <div class="docs-layout">
            <aside class="docs-sidebar" id="sidebar">
                <div class="loading-text">正在加载目录...</div>
            </aside>
            <main class="docs-content markdown-body" id="content">
                <h1 style="color: #00f6ff;">欢迎使用</h1>
                <p>请选择左侧栏的文档进行阅读。</p>
            </main>
        </div>
    </div>

    <script>
        // 自定义 marked.js 渲染器，拦截代码块以提取显示代码语言/标题
        const renderer = {
            code(codeObj, inlineLang, inlineEscaped) {
                // 兼容不同版本的 marked (新版本传对象，老版本传参数)
                let code = typeof codeObj === 'object' ? codeObj.text : codeObj;
                let lang = typeof codeObj === 'object' ? codeObj.lang : inlineLang;

                let languageLabel = '';
                if (lang) {
                    languageLabel = `<div class="code-header" style="background: rgba(0, 246, 255, 0.2); color: #00f6ff; padding: 5px 15px; font-family: 'Orbitron', monospace; font-size: 0.9em; font-weight: bold; border-top-left-radius: 4px; border-top-right-radius: 4px; border: 1px solid rgba(0, 246, 255, 0.3); border-bottom: none; display: inline-block;">${lang}</div><div style="clear: both;"></div>`;
                }

                const escapedCode = code.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');

                const linesCount = code.split('\n').length;
                const isLong = linesCount > 10;
                
                let html = `<div class="custom-code-block" style="margin-bottom: 20px;">` + 
                           languageLabel + 
                           `<div class="code-collapse-wrapper" style="position: relative;">` +
                           `<pre class="code-collapse-pre ${isLong ? 'collapsed' : ''}" style="margin-top: 0; border-top-left-radius: ${lang ? '0' : '4px'}; border: 1px solid rgba(0, 246, 255, 0.3); border-radius: 4px; ${lang ? 'border-top-left-radius: 0;' : ''} ${isLong ? 'border-bottom-left-radius: 0; border-bottom-right-radius: 0; border-bottom: none; transition: max-height 0.4s ease-out; max-height: 280px; overflow-y: hidden;' : ''} padding: 15px; overflow-x: auto; background: rgba(5, 3, 10, 0.6); box-shadow: inset 0 0 10px rgba(0,0,0,0.8); margin-bottom: 0;"><code style="color: #e0e0e0; font-family: Consolas, monospace; line-height: 1.5;" class="${lang ? 'language-' + lang : ''}">${escapedCode}</code></pre>`;
                
                if (isLong) {
                    // 使用底部的暗色遮罩层形成渐变消失的视觉效果，bottom 设为 8px 以避开悬浮在这个高度底部的水平滚动条
                    html += `<div class="code-fade-out" style="position: absolute; bottom: 8px; left: 0; right: 0; height: 60px; background: linear-gradient(transparent, rgba(6,4,13,0.95)); pointer-events: none;"></div>`;
                }
                html += `</div>`;
                
                if (isLong) {
                    html += `<button class="code-toggle-btn" data-lines="${linesCount}" onclick="window.toggleCodeBlock(this)" onmouseover="this.style.background='rgba(0,246,255,0.2)'" onmouseout="this.style.background='rgba(0,246,255,0.05)'" style="display: block; width: 100%; padding: 8px; background: rgba(0,246,255,0.05); border: 1px solid rgba(0,246,255,0.3); color: #00f6ff; cursor: pointer; border-bottom-left-radius: 4px; border-bottom-right-radius: 4px; font-family: monospace; font-size: 0.9em; transition: background 0.3s; text-align: center; margin-top: 0;">▼ 展开余下代码 (${linesCount} 行)</button>`;
                }
                html += `</div>`;

                return html;
            }
        };

        // 统一的应用初始化逻辑，等待必须的脚本加载完成后再进行页面绘制
        function initializeApp() {
            const markedReady = typeof marked !== 'undefined' && typeof marked.parse === 'function';
            const mathJaxReady = typeof MathJax !== 'undefined' && typeof MathJax.typesetPromise === 'function';

            if (!markedReady || !mathJaxReady) {
                // 等待引擎就绪
                setTimeout(initializeApp, 150);
                return;
            }

            // 引擎就绪，配置 marked.js renderer
            try {
                marked.use({ renderer });
            } catch (e) {
                console.error("Marked.js init error:", e);
            }

            // 隐藏全局加载层，展示页面
            const loader = document.getElementById('engine-loader');
            if (loader) {
                loader.style.opacity = '0';
                setTimeout(() => loader.style.display = 'none', 400);
            }

            // 获取文档树
            fetchDocsTree();

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
            }
        }

        document.addEventListener("DOMContentLoaded", initializeApp);

        window.toggleCodeBlock = function(btn) {
            const wrapper = btn.previousElementSibling;
            const pre = wrapper.querySelector('.code-collapse-pre');
            const fadeOut = wrapper.querySelector('.code-fade-out');
            
            if (pre.classList.contains('collapsed')) {
                // 展开动画
                pre.style.maxHeight = pre.scrollHeight + "px";
                pre.classList.remove('collapsed');
                if (fadeOut) fadeOut.style.display = 'none';
                btn.innerHTML = '▲ 收起代码';
                
                // 动画结束后解除最大高度限制，防止后续窗口改变（如缩放）影响内部布局
                setTimeout(() => {
                    if (!pre.classList.contains('collapsed')) {
                        pre.style.maxHeight = 'none';
                    }
                }, 400);
            } else {
                // 折叠动画
                // 先把 max-height 设为具体像素像素才能触发过度动画
                pre.style.maxHeight = pre.scrollHeight + "px";
                
                // 强制重绘，应用初始状态
                pre.offsetHeight; 
                
                // 执行折叠目标状态
                pre.style.maxHeight = "280px";
                pre.classList.add('collapsed');
                if (fadeOut) fadeOut.style.display = 'block';
                const linesCount = btn.getAttribute('data-lines');
                btn.innerHTML = `▼ 展开余下代码 (${linesCount} 行)`;
            }
        };

        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('collapsed');
        }

        function toggleFolder(el) {
            el.classList.toggle('collapsed');
            const ul = el.nextElementSibling;
            if (ul && ul.classList.contains('folder-content')) {
                ul.classList.toggle('hidden');
            }
        }

        async function fetchDocsTree() {
            try {
                const res = await fetch('/api/docs/tree');
                const tree = await res.json();
                const sidebar = document.getElementById('sidebar');
                sidebar.innerHTML = renderTree(tree);
                
                const firstFile = findFirstFile(tree);
                if (firstFile) {
                    loadDoc(firstFile.path);
                }
            } catch (err) {
                console.error("加载文档树失败", err);
                document.getElementById('sidebar').innerHTML = '<div style="color:#ff2bd6; padding: 20px; font-family: monospace;">[错误] 找不到文档数据</div>';
            }
        }

        function renderTree(nodes) {
            if (!nodes || nodes.length === 0) return '';
            let html = '<ul class="folder-content">';
            for (const node of nodes) {
                if (node.type === 'dir') {
                    html += `
                        <li>
                            <div class="docs-dir-title" onclick="toggleFolder(this)">> ${node.name}</div>
                            ${renderTree(node.children)}
                        </li>
                    `;
                } else if (node.type === 'file') {
                    const safePath = encodeURIComponent(node.path);
                    html += `
                        <li>
                            <a data-path="${node.path}" onclick="loadDoc('${safePath}')">_ ${node.name}</a>
                        </li>
                    `;
                }
            }
            html += '</ul>';
            return html;
        }

        function findFirstFile(nodes) {
            for (const node of nodes) {
                if (node.type === 'file') return node;
                if (node.type === 'dir') {
                    const found = findFirstFile(node.children);
                    if (found) return found;
                }
            }
            return null;
        }

        async function loadDoc(encodedPath) {
            const path = decodeURIComponent(encodedPath);
            
            document.querySelectorAll('.docs-sidebar a').forEach(a => a.classList.remove('active'));
            const safeSelector = path.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            const activeLink = document.querySelector('.docs-sidebar a[data-path="' + safeSelector + '"]');
            if (activeLink) activeLink.classList.add('active');

            if (window.innerWidth <= 768) {
                document.getElementById('sidebar').classList.add('collapsed');
            }

            try {
                document.getElementById('content').innerHTML = '<div class="loading-text">正在加载文档内容...</div>';
                const res = await fetch('/api/docs/content/' + encodedPath);
                if (res.status === 404) {
                    document.getElementById('content').innerHTML = '<h2 style="color:#ff2bd6;">[404] 找不到该文档</h2>';
                    return;
                }
                const data = await res.json();

                // 此时前端脚本必定已由全局 loader 等待验证完毕，可直接调用
                try {
                    document.getElementById('content').innerHTML = marked.parse(data.content);
                } catch (markErr) {
                    console.error("Marked.js resolve err:", markErr);
                    document.getElementById('content').innerHTML = "<pre>" + data.content + "</pre>";
                }

                if (window.MathJax && window.MathJax.typesetPromise) {
                    MathJax.typesetPromise([document.getElementById('content')]).catch(err => console.error("MathJax render error:", err));
                }
            } catch (err) {
                console.error("加载文档内容失败", err);
                // document.getElementById('content').innerHTML = '<h2 style="color:#ff2bd6;">[错误] 文档加载失败</h2>';
            }
        }
    </script>
</body>
</html>
