<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.L.O.V.E - 视频广场</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="stylesheet" href="/static/style.css">
    <style>
        .section-title {
            color: #00f6ff;
            font-family: 'Orbitron', sans-serif;
            text-transform: uppercase;
            letter-spacing: 2px;
            border-bottom: 1px solid rgba(0, 246, 255, 0.2);
            padding-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 246, 255, 0.4);
            margin-top: 40px;
        }
    </style>
    <!-- 使用本地静态资源，避免网络节点和防火墙引起的加载失败或极慢 -->
    <script src="/static/echarts.min.js"></script>
    <script src="/static/echarts-gl.min.js"></script>
</head>
<body>
    <header>
        <div>
            <h2>视频推荐广场</h2>
            <small style="color: #ff2bd6; font-family: monospace; letter-spacing: 1px;">[基于 TF-IDF & 余弦相似度]</small>
        </div>
        <nav>
            <a href="/">首页</a>
            <a href="/demo">视频广场</a>
            <a href="/explain">技术文档</a>
            <a href="#" onclick="clearHistory(); return false;">清空观看历史</a>
        </nav>
    </header>

    
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: baseline;">
            <h2 class="section-title" style="border-bottom: none; margin-bottom: 0;">> 向量空间分布模型 <span id="viz-title-ext" style="font-size: 0.5em; color: rgba(255,255,255,0.5);">[2D PCA Projection]</span></h2>
            <button id="toggle-dimension-btn" style="background: rgba(0, 246, 255, 0.1); border: 1px solid #00f6ff; color: #00f6ff; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron', monospace; transition: all 0.3s;">切换至 3D 视图</button>
        </div>
        <div style="border-bottom: 1px solid rgba(0, 246, 255, 0.2); margin-bottom: 10px; width: 100%;"></div>
        <div id="vector-viz" style="width: 100%; height: 450px; background: rgba(5,3,10,0.6); border: 1px solid rgba(0,246,255,0.2); border-radius: 4px; box-shadow: 0 0 15px rgba(0,246,255,0.1); margin-bottom: 40px; position: relative;">
            <div id="viz-loading" style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #00f6ff; font-family: monospace; animation: pulse 1.5s infinite;">
                模型数据降维中 (LOADING PCA)...
            </div>
        </div>

        <h2 class="section-title">> 为您推荐 <span style="font-size: 0.5em; color: rgba(255,255,255,0.5);">[基于观看历史]</span></h2>
        <div id="recommendations-container" class="video-grid" style="margin-bottom: 40px; display: none;">
            <!-- 推荐视频会在这里加载 -->
        </div>
        <p id="no-history-msg" style="color:rgba(0, 246, 255, 0.5); font-style:italic; font-family: monospace;">当前暂无观看历史，请先浏览以下视频获取推荐。</p>

        <div style="display: flex; justify-content: space-between; align-items: baseline; margin-top: 40px;">
            <h2 class="section-title" style="margin-top: 0; border-bottom: none; margin-bottom: 0;">> 全部视频</h2>
            <button id="refresh-videos-btn" style="background: rgba(0, 246, 255, 0.1); border: 1px solid #00f6ff; color: #00f6ff; padding: 5px 15px; border-radius: 4px; cursor: pointer; font-family: 'Orbitron', monospace; transition: all 0.3s; margin-left: 20px;">换一批</button>
        </div>
        <div style="border-bottom: 1px solid rgba(0, 246, 255, 0.2); margin-bottom: 15px; width: 100%;"></div>
        <div id="video-list" class="video-grid">
            <!-- 视频列表将由 JS 动态生成 -->
            <p style="font-family: monospace; color: #ff2bd6; animation: pulse 1.5s infinite;">正在加载数据...</p>
        </div>
    </div>

    <script src="/static/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const history = getHistory();
            
            // 3. 渲染数据可视化
            fetch('/api/visualize', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history: history })
            })
            .then(res => res.json())
            .then(data => {
                document.getElementById('viz-loading').style.display = 'none';
                let chart = echarts.init(document.getElementById('vector-viz'));
                let is3D = false;

                function renderChart() {
                    let baseItemStyle = is3D ? { color: 'rgba(0, 246, 255, 0.6)' } : { color: 'rgba(0, 246, 255, 0.6)', shadowBlur: 10, shadowColor: '#00f6ff' };
                    let userItemStyle = is3D ? { color: '#ff2bd6' } : { color: '#ff2bd6', shadowBlur: 20, shadowColor: '#ff2bd6', borderColor: '#fff', borderWidth: 2 };

                    const seriesData = [{
                        name: '全部视频',
                        type: is3D ? 'scatter3D' : 'scatter',
                        coordinateSystem: is3D ? 'cartesian3D' : 'cartesian2d',
                        symbolSize: function(val) {
                            let sim = val[is3D ? 5 : 4];
                            return sim > 0.1 ? 16 : 8; // If similar, larger symbol
                        },
                        itemStyle: baseItemStyle,
                        data: data.videos.map(v => ({
                            value: is3D ? [v.x, v.y, v.z, v.title, v.tags, v.similarity || 0, v.video_id] 
                                        : [v.x, v.y, v.title, v.tags, v.similarity || 0, v.video_id],
                            itemStyle: {
                                color: (v.similarity && v.similarity > 0.1) ? 'rgba(255, 43, 214, 0.8)' : 'rgba(0, 246, 255, 0.6)'
                            }
                        }))
                    }];

                    if (data.user) {
                        seriesData.push({
                            name: '用户特征坐标',
                            type: is3D ? 'scatter3D' : 'scatter',
                            coordinateSystem: is3D ? 'cartesian3D' : 'cartesian2d',
                            symbolSize: 24,
                            itemStyle: userItemStyle,
                            data: [{
                                value: is3D ? [data.user.x, data.user.y, data.user.z, 'User Vector']
                                            : [data.user.x, data.user.y, 'User Vector']
                            }]
                        });
                    }

                    const tooltipFormatter = function (param) {
                        if (param.seriesName === '用户特征坐标') {
                            let tip = '<strong style="color:#ff2bd6;">[ 用户特征雷达 (User Vector) ]</strong><br/>';
                            data.user.keywords.forEach(kw => {
                                tip += `${kw.word}: ${(kw.weight).toFixed(4)}<br/>`;
                            });
                            return `<div style="max-width: 300px; white-space: normal; word-wrap: break-word;">${tip}</div>`;
                        }
                        const val = param.data.value;
                        const tIdx = is3D ? 3 : 2;
                        const tagsIdx = is3D ? 4 : 3;
                        const simIdx = is3D ? 5 : 4;
                        return `
                            <div style="max-width: 300px; white-space: normal; word-wrap: break-word; line-height: 1.5;">
                                <strong style="color:#00f6ff">${val[tIdx]}</strong><br/>
                                <span style="color:rgba(255,255,255,0.6)">标签: ${val[tagsIdx]}</span><br/>
                                ${val[simIdx] > 0 ? `<span style="color:#ff2bd6">匹配度: ${(val[simIdx]*100).toFixed(1)}%</span>` : ''}
                            </div>
                        `;
                    };

                    let option = {
                        backgroundColor: 'transparent',
                        tooltip: {
                            backgroundColor: 'rgba(5, 3, 10, 0.9)',
                            borderColor: '#00f6ff',
                            textStyle: { color: '#fff' },
                            extraCssText: 'box-shadow: 0 0 15px rgba(0,246,255,0.2); max-width: 320px; white-space: normal; word-wrap: break-word;',
                            formatter: tooltipFormatter,
                            confine: true // 限制在图表的区域内
                        }
                    };

                    if (is3D) {
                        option.grid3D = {
                            viewControl: { autoRotate: true, autoRotateSpeed: 4 },
                            axisLine: { lineStyle: { color: 'rgba(0, 246, 255, 0.3)' } },
                            splitLine: { lineStyle: { color: 'rgba(0, 246, 255, 0.1)' } },
                            axisPointer: { lineStyle: { color: 'rgba(255, 43, 214, 0.4)' } },
                            environment: 'transparent'
                        };
                        option.xAxis3D = { type: 'value', name: 'X' };
                        option.yAxis3D = { type: 'value', name: 'Y' };
                        option.zAxis3D = { type: 'value', name: 'Z' };
                        option.series = seriesData;
                    } else {
                        option.grid = { left: '2%', right: '2%', top: '5%', bottom: '5%' };
                        option.xAxis = {
                            type: 'value',
                            splitLine: { lineStyle: { color: 'rgba(0, 246, 255, 0.1)', type: 'dashed' } },
                            axisLabel: { show: false }
                        };
                        option.yAxis = {
                            type: 'value',
                            splitLine: { lineStyle: { color: 'rgba(0, 246, 255, 0.1)', type: 'dashed' } },
                            axisLabel: { show: false }
                        };
                        option.series = seriesData;
                    }

                    chart.dispose(); // 用 dispose 完全销毁旧的上下文（特别是跨 2D 和 3D GL 的时候）
                    chart = echarts.init(document.getElementById('vector-viz'));

                    chart.setOption(option);
                    
                    // 重新绑定点击事件
                    chart.on('click', function(params) {
                        if (params.seriesName === '全部视频') {
                            const vIdIdx = is3D ? 6 : 5;
                            window.location.href = `/video/${params.data.value[vIdIdx]}`;
                        }
                    });
                }

                renderChart();

                const toggleBtn = document.getElementById('toggle-dimension-btn');
                toggleBtn.addEventListener('click', () => {
                    is3D = !is3D;
                    document.getElementById('viz-title-ext').innerText = is3D ? '[3D PCA Projection]' : '[2D PCA Projection]';
                    toggleBtn.innerText = is3D ? '切换至 2D 视图' : '切换至 3D 视图';
                    renderChart();
                });

                let resizeTimer;
                window.addEventListener('resize', () => {
                    clearTimeout(resizeTimer);
                    resizeTimer = setTimeout(() => {
                        chart.resize();
                    }, 200);
                });
            })
            .catch(err => {
                document.getElementById('viz-loading').innerText = '模型降维失败或数据不存在';
            });

            // 动态计算适合当前屏幕宽度的列数
            function getGridColumnCount() {
                const containerWidth = document.querySelector('.container').clientWidth;
                let columns = Math.floor((containerWidth + 25) / 305);
                return Math.max(columns, 1);
            }

            // 1. 获取所有视频（带有随机和适应行数的功能）
            function fetchRandomVideos() {
                const cols = getGridColumnCount();
                const limit = cols * 4; // 全部视频默认给4行
                const listEl = document.getElementById('video-list');
                listEl.innerHTML = '<p style="font-family: monospace; color: #00f6ff; animation: pulse 1.5s infinite;">加载中...</p>';
                
                fetch(`/api/videos?random=1&limit=${limit}`)
                    .then(res => res.json())
                    .then(videos => {
                        listEl.innerHTML = '';
                        videos.forEach(v => {
                            const card = document.createElement('div');
                            card.className = 'video-card';
                            card.onclick = () => window.location.href = `/video/${v.video_id}`;
                            card.innerHTML = `
                                <h3>${v.title}</h3>
                                <div class="tags">${v.tags}</div>
                            `;
                            listEl.appendChild(card);
                        });
                    });
            }

            fetchRandomVideos();
            document.getElementById('refresh-videos-btn').addEventListener('click', fetchRandomVideos);

            // 2. 根据本地历史获取个性化推荐
            if (history.length > 0) {
                document.getElementById('no-history-msg').style.display = 'none';
                document.getElementById('recommendations-container').style.display = 'grid';
                
                const recCols = getGridColumnCount();
                const recLimit = recCols * 2; // 推荐显示精确的两行，不留空
                
                fetch('/api/recommend', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ history: history, top_n: recLimit })
                })
                .then(res => res.json())
                .then(data => {
                    const recContainer = document.getElementById('recommendations-container');
                    recContainer.innerHTML = '';
                    if (data.recommendations && data.recommendations.length > 0) {
                        data.recommendations.forEach(r => {
                            const card = document.createElement('div');
                            card.className = 'video-card';
                            card.onclick = () => window.location.href = `/video/${r.video_id}`;
                            card.innerHTML = `
                                <h3>${r.title}</span></h3>
                                <div class="score-badge" style="float:none; display:inline-block; margin-top:5px; background:rgba(255,43,214,0.1); border:1px solid rgba(255,43,214,0.3); color:#ff2bd6; border-radius:2px; padding:2px 6px;">推荐相似度: ${(r.score * 100).toFixed(1)}%</div><br>
                                <div class="tags">${r.tags}</div>
                            `;
                            recContainer.appendChild(card);
                        });
                    } else {
                        recContainer.innerHTML = '<p style="font-family: monospace; color: #ff2bd6;">暂无推荐内容，请尝试点击上方视频获取更多推荐。</p>'; 
                    }
                });
            }
        });
    </script>
</body>
</html>
