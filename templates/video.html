<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>视频播放 - 基于内容的推荐系统</title>
    <link rel="icon" type="image/png" href="/icon.png" />
    <link rel="stylesheet" href="/static/style.css">
</head>
<body data-video-id="{{ video_id }}">
    <header class="header-nav">
        <div>
            <h2>视频播放</h2>
        </div>
        <nav class="header-links">
            <a href="/">首页</a>
            <a href="/demo">视频广场</a>
            <a href="/explain">技术文档</a>
        </nav>
    </header>

    <div class="container play-layout">
        <div class="main-content">
            <!-- 使用真实的 HTML5 video 标签，动态加载对应的 mp4 文件 -->
            <video id="video-player" class="video-player-mock" controls autoplay style="background-color: #000; width: 100%; border-radius: 4px; box-shadow: 0 0 15px rgba(0, 246, 255, 0.2);">
                您的浏览器不支持视频播放。
            </video>
            <h2 id="video-title" style="color: #00f6ff; font-family: 'Orbitron', sans-serif; text-shadow: 0 0 10px rgba(0,246,255,0.4);">...</h2>
            <p style="color: rgba(255,255,255,0.7);"><strong style="color: #ff2bd6;">> 视频标签: </strong> <span id="video-tags" class="tags"></span></p>
        </div>
        
        <div class="sidebar">
            <h3>> 相似视频推荐</h3>
            <div id="recommendations-list">
                <p style="font-family: monospace; color: #ff2bd6;">正在加载推荐...</p>
            </div>
        </div>
    </div>

    <script src="/static/main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const currentVideoId = parseInt(document.body.dataset.videoId, 10); 

            // 记录到本地浏览历史中
            addVideoToHistory(currentVideoId);

            // 获取当前视频信息
            fetch(`/api/video/${currentVideoId}`)
                .then(res => res.json())
                .then(data => {
                    const videoPlayer = document.getElementById('video-player');
                    videoPlayer.src = `/videodataset/${currentVideoId}.mp4`;    

                    document.getElementById('video-title').innerText = data.title;
                    document.getElementById('video-tags').innerText = data.tags;
                });

            // 获取推荐列表
            const history = getHistory();
            fetch('/api/recommend', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ history: history })
            })
            .then(res => res.json())
            .then(data => {
                const recList = document.getElementById('recommendations-list');
                recList.innerHTML = '';
                if (data.recommendations && data.recommendations.length > 0) {
                    data.recommendations.forEach(r => {
                        const item = document.createElement('div');
                        item.className = 'rec-item';
                        item.onclick = () => window.location.href = `/video/${r.video_id}`;
                        item.innerHTML = `
                            <h4 class="rec-item-title">${r.title} <span class="score-badge">相似度: ${(r.score).toFixed(2)}</span></h4>
                            <p>${r.tags}</p>
                        `;
                        recList.appendChild(item);
                    });
                } else {
                    recList.innerHTML = '<p style="color:rgba(0,246,255,0.5); font-family:monospace;">暂无足够数据生成推荐。</p>';
                }
            });
        });
    </script>
</body>
</html>
